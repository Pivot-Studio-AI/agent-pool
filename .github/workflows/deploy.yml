name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy server
        run: railway up --detach --service agent-pool-server
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: 8e57601f-224a-42d4-8795-4b8125920358
          RAILWAY_ENVIRONMENT: production

  deploy-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy dashboard
        run: cd packages/dashboard && railway up --detach --service agent-pool-dashboard
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: 8e57601f-224a-42d4-8795-4b8125920358
          RAILWAY_ENVIRONMENT: production
